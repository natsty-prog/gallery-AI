<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Prompting: The Power of Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-dark: #003366;
            --primary-blue: #004a94;
            --accent-orange: #ED6C44;
        }

        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
        }

        .header-gradient {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
            margin-top: 4rem;
            border-right: 6px solid var(--accent-orange);
            padding-right: 15px;
        }

        .image-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            background-color: #f3f4f6;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: zoom-in; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .style-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 51, 102, 0.9);
            color: white;
            padding: 12px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            max-height: 90%;
            overflow-y: auto;
        }

        /* עיצוב פס גלילה מינימליסטי לשכבת הריחוף */
        .style-overlay::-webkit-scrollbar {
            width: 4px;
        }
        .style-overlay::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        .image-card:hover .style-overlay {
            transform: translateY(0);
        }

        .overlay-text {
            font-weight: bold;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .overlay-desc {
            font-size: 0.8rem;
            line-height: 1.4;
            opacity: 0.95;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 8px;
            margin-top: 6px;
        }

        .loader {
            border: 3px solid #e5e7eb;
            border-top: 3px solid var(--accent-orange);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .error-message {
            color: #dc2626;
            font-size: 0.75rem;
            padding: 1rem;
            text-align: center;
        }
        
        .missing-image-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: #f3f4f6;
            color: #6b7280;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div id="gallery-container"></div>

        <div class="mt-20 p-8 bg-orange-50 border-r-8 border-orange-500 rounded-2xl shadow-sm">
            <h3 class="font-bold text-orange-900 text-lg mb-3">לולאת העבודה החזותית</h3>
            <p class="text-orange-800 leading-relaxed text-base">
                כשאתם מדייקים תמונה, שנו רק מילה או שתי מילים בכל סבב וראו איך זה משפיע על התוצאה. זו דרך טובה ללמוד איך המודל מפרש את הבקשות שלכם ולשפר את התוצר בהדרגה.
            </p>
        </div>

        <div class="mt-8 p-8 bg-blue-50 border-r-8 border-blue-600 rounded-2xl shadow-sm">
            <p class="font-bold text-blue-900 text-lg mb-3">עושים ולא רק מדברים</p>
            <p class="text-blue-800 leading-relaxed">
                בבניית גלריית הדוגמאות נעזרנו ב-<strong>Imagen 4.0</strong>.
            </p>
        </div>
    </div>

    <!-- חלונית הגדלת התמונה (Lightbox/Modal) -->
    <div id="image-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-sm cursor-zoom-out" onclick="if(event.target === this) closeModal()">
        <button class="absolute top-4 right-6 text-white text-5xl hover:text-gray-300 transition-colors focus:outline-none" onclick="closeModal()" title="סגור">&times;</button>
        <img id="modal-img" class="max-w-[90%] max-h-[70vh] object-contain rounded-lg shadow-2xl cursor-default" src="" alt="תמונה מוגדלת">
        <p id="modal-caption" class="text-white text-xl mt-6 font-semibold text-center px-4 drop-shadow-md cursor-default"></p>
        <p id="modal-desc" class="text-gray-300 text-base mt-2 max-w-3xl text-center px-4 drop-shadow-md cursor-default"></p>
    </div>

    <script>
        // שימו לב: הדביקו את מפתח ה-API שלכם בין המרכאות לפני העלאה למודל
        const apiKey = ""; 
        
        const modelName = "imagen-4.0-generate-001";
        
        const galleryData = [
            {
                title: "גלריית סגנון גרפי:",
                basePrompt: "A professional university professor with glasses and a friendly expression, teaching students in a modern classroom, medium shot, chalkboard in background",
                items: [
                    { label: "צילום ריאליסטי (Realistic)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית סגנון גרפי/ריאלסטי.jpg", suffix: ", high-quality photograph, realistic lighting, 8k resolution, cinematic" },
                    { label: "קומיקס (Comic Style)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית סגנון גרפי/קומיקס (Comic Style).jpg", suffix: ", vibrant comic book illustration, bold black ink outlines, flat colors" },
                    { label: "ציור מהמאה ה-17 (17th Century Painting)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית סגנון גרפי/ציור מהמאה ה17 (17th Century Painting).jpg", suffix: ", 17th century oil painting, baroque style, masterwork, dramatic chiaroscuro, Rembrandt lighting, visible brushstrokes" }
                ]
            },
            {
                title: "גלריית סוגי מצלמות:",
                basePrompt: "A group of young friends sitting on a blanket in a sunny park, laughing and talking, trees in the background",
                items: [
                    { 
                        label: "מצלמת פילם (35mm)", 
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית סוגי מצלמות/מצלמת פילם (35mm).jpg", 
                        suffix: ", shot on 35mm film, vintage photography, film grain, natural tones",
                        desc: 'מצלמה המשתמשת בסרט צילום, המעניקה לתמונה מראה קלאסי עם "גרעיניות" עדינה וגוונים טבעיים. שימוש במונח זה עוזר לקבל תוצאה שנראית כמו צילום רטרו או צילום עיתונות מסורתי.'
                    },
                    { 
                        label: "מצלמה חד-פעמית (Toy camera)", 
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית סוגי מצלמות/מצלמה חד-פעמית (Toy camera).jpg", 
                        suffix: ", disposable camera look, lo-fi, light leaks, saturated colors",
                        desc: 'מצלמה פשוטה עם עדשת פלסטיק המייצרת תמונות בעלות איכות טכנית נמוכה בכוונה, עם צבעים רווים או עיוותים קלים. שימוש במונח יוצר מראה "לא מושלם", ספונטני ונוסטלגי.'
                    },
                    { 
                        label: "מצלמת פולארויד (Polaroid Camera)", 
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית סוגי מצלמות/מצלמת פולארויד (Polaroid Camera).jpg", 
                        suffix: ", vintage polaroid photo, square format, faded colors, soft focus",
                        desc: 'מצלמה המפיקה תמונות לפיתוח מיידי, המאופיינות במסגרת לבנה רחבה ובמראה דהוי מעט עם ניגודיות גבוהה. שימוש במונח יעניק לתמונה תחושה של רגע אישי שנלכד בזמן אמת.'
                    },
                    { 
                        label: "מצלמת DSLR", 
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית סוגי מצלמות/DSLR.jpg", 
                        suffix: ", professional digital photography, high clarity, sharp focus, modern lens",
                        desc: 'מצלמה דיגיטלית מקצועית בעלת עדשות מתחלפות, המאפשרת שליטה מלאה בחדות ובעומק השדה. מונח זה משמש לקבלת תמונות חדות מאוד, איכותיות ובעלות מראה נקי ומודרני.'
                    }
                ]
            },
            {
                title: "גלריית תאורה:",
                basePrompt: "A beautiful bowl of various fruits like grapes, oranges, and bananas on a stone table",
                items: [
                    { label: "תאורת אולפן רכה (Soft light)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית תאורה/תאורת אולפן רכה (Soft light).jpg", suffix: ", professional softbox studio lighting, diffused shadows, soft look" },
                    { label: "תאורת ניאון חזקה (Hard Light)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית תאורה/תאורת ניאון חזקה (Hard Light).jpg", suffix: ", direct neon lighting, sharp harsh shadows, dramatic contrast" },
                    { label: "אור טבעי מהצד (direct sunlight)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית תאורה/אור טבעי מהצד (direct sunlight).jpg", suffix: ", morning sunlight coming from a side window, natural beams, warm glow" },
                    { label: "תאורה דרמטית (dramatic hard light)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית תאורה/תאורה דרמטית (dramatic hard light).jpg", suffix: ", high-key drama lighting, deep shadows, spotlight effect" }
                ]
            },
            {
                title: "גלריית זוויות צילום:",
                basePrompt: "A soccer player kicking a ball on a green field during a match",
                items: [
                    { label: "מבט על (Top shot)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית זווית צילום/מבט על (Top shot).jpg", suffix: ", bird's eye view, looking straight down from the sky" },
                    { label: "גובה עיניים (Eye level)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית זווית צילום/גובה עיניים (Eye level).jpg", suffix: ", standard perspective, shot from the eye level of a person" },
                    { label: "זווית גבוהה (High angle)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית זווית צילום/זווית גבוהה (High angle).jpg", suffix: ", high angle shot, looking down at the player" },
                    { label: "זווית נמוכה (Worm's-eye view)", staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית זווית צילום/זווית נמוכה (Worm’s-eye view).jpg", suffix: ", extremely low angle, looking up from the ground level" }
                ]
            },
            {
                title: "גלריית קומפוזיציה:",
                items: [
                    { 
                        label: "חוק השלישים (Rule of Thirds)", 
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית קומפוזיציה/חוק השלישים (Rule of Thirds).jpg", 
                        prompt: "A small green plant on a wooden shelf near a window, sunlight hitting the plant, rule of thirds composition, professional photography",
                        desc: 'טכניקת קומפוזיציה שבה מחלקים את התמונה ל-9 ריבועים שווים, וממקמים את הנושא המרכזי על אחד הקווים או בנקודות המפגש ביניהם. זהו כלי ליצירת עניין ויזואלי ותמונה מאוזנת יותר מאשר מיקום הנושא במרכז.'
                    },
                    { 
                        label: "סימטרי, מרכזי (Centered Symmetry)", 
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית קומפוזיציה/סימטרי, מרכזי (Centered Symmetry).jpg", 
                        prompt: "Centered symmetrical shot of a single small plant and books on a minimalist white shelf, direct eye level" 
                    },
                    { 
                        label: "חלל ריק (Negative Space)", 
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית קומפוזיציה/חלל ריק (Negative Space).jpg", 
                        prompt: "A minimalist modern building silhouette at sunset against a vast empty orange and blue sky, negative space composition",
                        desc: 'השטח הריק מסביב לנושא המרכזי של התמונה. שימוש בחלל ריק עוזר להדגיש את הנושא, יוצר תחושה של מינימליזם, שקט או בדידות, ומונע מהתמונה להיראות עמוסה מדי.'
                    },
                    { 
                        label: "גריד חזרתי (Grid composition)",
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית קומפוזיציה/גריד חזרתי (Grid composition).jpg", 
                        prompt: "Repeating grid patterns of many colorful books perfectly aligned on a library bookshelf, grid composition",
                        desc: 'קומפוזיציה המבוססת על חלוקת הפריים לתבנית של רשת או דפוסים חוזרים. טכניקה זו מייצרת תחושה של סדר, ארגון, קצב ומבניות חזקה בתוך הדימוי החזותי.'
                    }
                ]
            },
            {
                title: "גלריית אווירה:",
                items: [
                    {
                        label: "אווירה קסומה (Mystical atmosphere)",
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית אווירה/אווירה קסומה (Mystical atmosphere).jpg"
                    },
                    {
                        label: "אווירה חשוכה (Dark atmosphere)",
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית אווירה/אווירה חשוכה (Dark atmosphere).jpg"
                    },
                    {
                        label: "אווירה חיה (Lively atmosphere)",
                        staticImage: "גלריית תמונות יח_ 3 - קורס AI/גלריית אווירה/אווירה חיה (Lively atmosphere).jpg"
                    }
                ]
            }
        ];

        // פונקציות לפתיחה וסגירה של התמונה המוגדלת
        function openModal(imgSrc, captionText, descText) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            const modalCaption = document.getElementById('modal-caption');
            const modalDesc = document.getElementById('modal-desc');

            modalImg.src = imgSrc;
            modalCaption.innerText = captionText;
            modalDesc.innerText = descText || ''; // הצגת התיאור אם קיים

            modal.classList.remove('hidden');
            // מאפשר לדפדפן לרנדר את ה-display:flex לפני שינוי השקיפות לאנימציה חלקה
            setTimeout(() => {
                modal.classList.remove('opacity-0');
            }, 10);
            
            document.body.style.overflow = 'hidden'; // חסימת גלילה של הרקע
        }

        function closeModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.add('opacity-0');
            document.body.style.overflow = ''; // שחרור גלילת הרקע
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('modal-img').src = '';
            }, 300);
        }

        // סגירת החלונית בלחיצה על מקש Escape
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                const modal = document.getElementById('image-modal');
                if (!modal.classList.contains('hidden')) {
                    closeModal();
                }
            }
        });

        async function fetchImageWithRetry(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:predict?key=${apiKey}`;
            const payload = {
                instances: [{ prompt: prompt }],
                parameters: { sampleCount: 1 }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    if (response.ok && data.predictions?.[0]?.bytesBase64Encoded) {
                        return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
                } catch (e) {
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
                }
            }
            return { error: "שגיאה בטעינה. ודאו שמפתח ה-API תקין." };
        }

        function init() {
            const container = document.getElementById('gallery-container');

            galleryData.forEach((section, index) => {
                const sectionEl = document.createElement('div');

                const h2 = document.createElement('h2');
                h2.className = 'section-title';
                if (index === 0) {
                    h2.style.marginTop = '0';
                }
                h2.innerText = section.title;
                sectionEl.appendChild(h2);

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-[repeat(auto-fill,minmax(130px,1fr))] gap-5 mb-12';

                sectionEl.appendChild(grid);
                container.appendChild(sectionEl);

                section.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'image-card';

                    let descriptionHtml = item.desc ? `<div class="overlay-desc">${item.desc}</div>` : '';

                    // קוד טיפול בתמונות סטטיות לעומת ייצור דינמי
                    if (item.staticImage) {
                        card.innerHTML = `
                            <img src="${item.staticImage}" class="w-full h-full object-cover" alt="${item.label}">
                            <div class="style-overlay">
                                <div class="overlay-text">${item.label}</div>
                                ${descriptionHtml}
                            </div>`;
                        
                        // הוספת אירוע הלחיצה להגדלת התמונה
                        card.onclick = () => openModal(item.staticImage, item.label, item.desc);
                        grid.appendChild(card);
                    } else {
                        card.classList.add('skeleton');
                        card.innerHTML = `<div class="loader"></div>`;
                        grid.appendChild(card);

                        const finalPrompt = item.prompt || (section.basePrompt + item.suffix);
                        
                        fetchImageWithRetry(finalPrompt).then(res => {
                            card.classList.remove('skeleton');
                            if (typeof res === 'string') {
                                card.innerHTML = `
                                    <img src="${res}" class="w-full h-full object-cover" alt="${item.label}">
                                    <div class="style-overlay">
                                        <div class="overlay-text">${item.label}</div>
                                        ${descriptionHtml}
                                    </div>`;
                                // הוספת אירוע הלחיצה לתמונות שנוצרות דינמית
                                card.onclick = () => openModal(res, item.label, item.desc);
                            } else {
                                card.innerHTML = `<div class="error-message">${res.error}</div>`;
                                card.style.cursor = 'default';
                                card.onclick = null;
                            }
                        });
                    }
                });
            });
        }

        window.onload = init;
    </script>
</body>
</html>
